<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор эффективности рекламы</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="card" aria-labelledby="app-title">
      <p class="eyebrow">Учебное веб-приложение</p>
      <h1 id="app-title">Калькулятор эффективности рекламы</h1>
      <p class="description">
        Введите рекламные показатели, чтобы рассчитать CTR, CPC, конверсию в заявки и CPL.
      </p>

      <form id="calculator-form" novalidate>
        <div class="form-grid">
          <label class="field" for="ad-spend">
            <span>Рекламный расход</span>
            <input id="ad-spend" name="adSpend" type="number" min="0" step="0.01" placeholder="Например, 15000" aria-describedby="ad-spend-hint">
            <small id="ad-spend-hint" class="field-hint">Укажите общий бюджет кампании в рублях.</small>
          </label>

          <label class="field" for="impressions">
            <span>Количество показов</span>
            <input id="impressions" name="impressions" type="number" min="0" step="1" placeholder="Например, 50000" aria-describedby="impressions-hint">
            <small id="impressions-hint" class="field-hint">Сколько раз объявление было показано аудитории.</small>
          </label>

          <label class="field" for="clicks">
            <span>Количество кликов</span>
            <input id="clicks" name="clicks" type="number" min="0" step="1" placeholder="Например, 1200" aria-describedby="clicks-hint">
            <small id="clicks-hint" class="field-hint">Сколько переходов получило объявление.</small>
          </label>

          <label class="field" for="leads">
            <span>Количество заявок</span>
            <input id="leads" name="leads" type="number" min="0" step="1" placeholder="Например, 80" aria-describedby="leads-hint">
            <small id="leads-hint" class="field-hint">Сколько заявок пришло после кликов.</small>
          </label>
        </div>

        <div class="actions">
          <button type="submit">Рассчитать</button>
          <button class="button-secondary" type="reset">Очистить</button>
        </div>
      </form>

      <div id="message" class="message" role="status" aria-live="polite"></div>

      <section class="results" aria-label="Результаты расчета">
        <article class="result-card">
          <span class="result-label">CTR</span>
          <strong id="ctr">—</strong>
          <small>CTR = клики / показы × 100</small>
        </article>

        <article class="result-card">
          <span class="result-label">CPC</span>
          <strong id="cpc">—</strong>
          <small>CPC = расход / клики</small>
        </article>

        <article class="result-card">
          <span class="result-label">Конверсия</span>
          <strong id="conversion">—</strong>
          <small>Конверсия = заявки / клики × 100</small>
        </article>

        <article class="result-card">
          <span class="result-label">CPL</span>
          <strong id="cpl">—</strong>
          <small>CPL = расход / заявки</small>
        </article>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
